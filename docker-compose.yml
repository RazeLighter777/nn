services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nn2
      POSTGRES_PASSWORD: nn2secret
      POSTGRES_DB: nn2
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nn2 -d nn2"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://nn2:nn2secret@postgres:5432/nn2
    ports:
      - "8080:8080"
    # Uncomment to mount a local .env instead of hard-coding credentials above:
    # env_file: .env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pg_data:
